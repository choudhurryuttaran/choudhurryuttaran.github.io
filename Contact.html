                    <div class="flex flex-wrap gap-4 pt-2">

                        <a href="https://www.linkedin.com/in/yourprofile" target="_blank" class="flex items-center justify-center w-14 h-14 bg-slate-800 hover:bg-blue-600/20 hover:text-blue-400 text-slate-300 rounded-xl transition-all border border-slate-700 hover:border-blue-500/50" title="LinkedIn">

                        <a href="https://www.facebook.com/yourprofile" target="_blank" class="flex items-center justify-center w-14 h-14 bg-slate-800 hover:bg-blue-500/20 hover:text-blue-400 text-slate-300 rounded-xl transition-all border border-slate-700 hover:border-blue-500/50" title="Facebook">

                        <button class="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg border border-slate-700 transition-colors flex items-center gap-2 group">
                            <span class="group-hover:-translate-y-1 transition-transform">👍</span> Like
                        </button>
                    </div>

                            <label for="textbox" class="block text-sm font-medium text-slate-300">Comments</label>
                            <textarea id="textbox" name="textbox" rows="4" placeholder="Type your message here..." maxlength="150" required

                        </div>
                        <button type="submit" class="w-full px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-lg shadow-blue-500/30 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
